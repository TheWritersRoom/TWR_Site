kind = "video"
previewPath = "/writers-room-video/"
title = "Writers Room — Feature Video"
version = "1.0.0"
id = "artifacts/writers-room-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/writers-room-video/" ]
localPort = 21191

[services.development]
run = "pnpm --filter @workspace/writers-room-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/writers-room-video", "run", "build" ]
publicDir = "artifacts/writers-room-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21191"
BASE_PATH = "/writers-room-video/"
